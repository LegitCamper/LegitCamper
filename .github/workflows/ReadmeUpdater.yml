name: Waka Readme Updater

on:
    schedule:
        # Runs at 12am
        - cron: '0 7 * * *'
    workflow_dispatch:
jobs:
    update-readme:
        name: Update Readme with Metrics
        runs-on: ubuntu-latest
        steps:
          - uses: anmol098/waka-readme-stats@master
            with:
                WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
                GH_TOKEN: ${{ secrets.GH_TOKEN }}
                SHOW_OS: "True"
                SHOW_PROJECTS: "True"
                SECTION_NAME: "stats"
                COMMIT_BY_ME: "True"
                SHOW_LINES_OF_CODE: "True"
                SHOW_TOTAL_CODE_TIME: "True"

                SHOW_DAYS_OF_WEEK: "True"
                SHOW_LANGUAGE: "True"
                SHOW_TIMEZONE: "True"
                SHOW_EDITORS: "True"
                SHOW_LANGUAGE_PER_REPO: "True"
                
                INPUT_COMMIT_EMAIL: "SawyerBristol@gmail.com"
                INPUT_COMMIT_USERNAME: "LegitCamper"

                IGNORED_REPOS: "-Samuel-Beuran---Automated-betting-bot, TinderBotz, YTShort-Dump, WallStreetBots, Myst, GitHub_Folder, Intro_Python, AdSense-Income"
